version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=odoo
      - POSTGRES_PASSWORD=odoo_password
    volumes:
      - odoo-db-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M

  web:
    image: odoo:17.0
    depends_on:
      - db
    ports:
      - "8069:8069"
    volumes:
      - odoo-web-data:/var/lib/odoo
      - ./odoo-backend/addons:/mnt/extra-addons
    environment:
      - HOST=db
      - USER=odoo
      - PASSWORD=odoo_password
    deploy:
      resources:
        limits:
          memory: 1.5G

  mcp-server:
    build: 
      context: ./mcp-server
    depends_on:
      - web
    ports:
      - "8000:8000"
    environment:
      # Use the Docker internal DNS name 'web' instead of 'localhost'
      - ODOO_URL=http://web:8069
    deploy:
      resources:
        limits:
          memory: 512M

  mcp-client:
    build: 
      context: ./mcp-client
    depends_on:
      - mcp-server
    ports:
      - "8501:8501"
    environment:
      # Use the Docker internal DNS name 'mcp-server' instead of 'localhost'
      - MCP_SERVER_URL=http://mcp-server:8000
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  odoo-db-data:
  odoo-web-data: